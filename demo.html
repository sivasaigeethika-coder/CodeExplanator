<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next-Gen Code Explainer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #334155;
      --primary-hover: #1e293b;
      --accent: #475569;
      --bg-header: linear-gradient(135deg, #1e293b, #0f172a);
      --card-bg: rgba(255, 255, 255, 0.94);
      --text-main: #0f172a;
      --text-muted: #475569;
      --border: #cbd5e1;
      --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; line-height: 1.6; color: var(--text-main); background-color: #eceef2; background-image: linear-gradient(135deg, #eceef2 0%, #e2e6ed 50%, #d5dbe4 100%); background-attachment: fixed; transition: background 0.6s; }
    header { background: var(--bg-header); color: #f8fafc; padding: 35px 20px; text-align: center; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .step-card { background: var(--card-bg); padding: 40px; border-radius: var(--radius); display: none; }
    .step-card.active { display: block; }
    .actions-panel { display: flex; justify-content: space-between; margin-top: 30px; }
    .btn { padding: 11px 22px; border-radius: var(--radius); cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    textarea { width: 100%; min-height: 280px; font-family: monospace; padding: 10px; }
    .output-card { background: #0f172a; color: #f8fafc; padding: 20px; border-radius: var(--radius); }
    pre { background: #020617; padding: 15px; color: #cbd5e1; white-space: pre-wrap; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <header>
    <h1>Next-Gen Code Explainer</h1>
    <p>Enterprise Code Analysis & Architectural Verification Engine</p>
  </header>

  <div class="container">
    <!-- Step 0, 1, 2, 3 as per your design -->
    <div class="step-card active" id="step0">
      <h2>Welcome!</h2>
      <button class="btn btn-primary" onclick="navigateToStep(1)">Get Started →</button>
    </div>

    <div class="step-card" id="step1">
      <h2>Step 1: Settings</h2>
      <select id="language"><option value="python">Python</option></select>
      <select id="explanationLanguage"><option value="english">English</option></select>
      <select id="level"><option value="beginner">Beginner</option></select>
      <select id="cross"><option value="no">Disable Cross References</option></select>
      <select id="visualization"><option value="none">None</option></select>
      <button class="btn btn-primary" onclick="navigateToStep(2)">Continue →</button>
    </div>

    <div class="step-card" id="step2">
      <h2>Step 2: Paste your code</h2>
      <textarea id="code" placeholder="Paste code here..."></textarea>
      <button class="btn btn-primary" id="submitBtn" onclick="handleFormSubmission()">Analyze Code</button>
    </div>

    <div class="step-card" id="step3">
      <h2>Step 3: Results</h2>
      <div id="explanation"></div>
      <pre id="programOutput"></pre>
      <div id="visualizationOutput"></div>
      <textarea id="feedback" placeholder="Refinement instructions..."></textarea>
      <button class="btn btn-primary" id="sendFeedback">Apply Corrections</button>
    </div>
  </div>

  <script>
    let currentStep = 0;
    function navigateToStep(s) {
      document.querySelectorAll('.step-card').forEach(c => c.classList.remove('active'));
      currentStep = s;
      document.getElementById('step' + s).classList.add('active');
    }

    async function handleFormSubmission() {
      const payload = {
        language: document.getElementById("language").value,
        explanation_language: document.getElementById("explanationLanguage").value,
        level: document.getElementById("level").value,
        code: document.getElementById("code").value,
        cross: document.getElementById("cross").value,
        visualization: document.getElementById("visualization").value
      };

      try {
        // FIX: Using relative paths instead of ngrok
        const response = await fetch("/explain", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        document.getElementById("programOutput").textContent = data.program_output;
        document.getElementById("explanation").innerHTML = marked.parse(data.explanation);
        navigateToStep(3);
      } catch (e) { alert("Error: " + e.message); }
    }

    document.getElementById("sendFeedback").addEventListener("click", async () => {
      const res = await fetch("/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: document.getElementById("code").value, feedback: document.getElementById("feedback").value })
      });
      const data = await res.json();
      document.getElementById("explanation").innerHTML = marked.parse(data.refined_explanation);
    });
  </script>
</body>
</html>
